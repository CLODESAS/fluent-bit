# =============================================================================
# Pipeline para el fork interno de Fluent Bit (Pragma).
#
# Reusa la plantilla devsecops-analisis-estatico-pipe-yml-execute con
# 'kind: fluentbit', que dispara los scripts del propio repo:
#   - scripts/build-windows-package.ps1   (Windows MSI/ZIP via cpack)
#   - scripts/build-linux.sh              (Linux tar.gz)
#   - scripts/build-macos.sh              (macOS tar.gz, arm64/x86_64)
#
# Despues del build, extiende devsecops-analisis-estatico-pipe-yml-artifacts
# con 'artifactSelection: fluentbit' para publicar como Universal Package en
# el feed Azure Artifacts de Pragma.
# =============================================================================

parameters:
  - name: soVersion
    displayName: Pool Image
    type: string
    default: 'windows-latest'
    values:
      - windows-latest
      - ubuntu-22.04
      - macOS-latest

  - name: multiOS
    displayName: Construir tambien en macOS (paralelo)
    type: boolean
    default: true

  # Naming rules
  - name: enable_naming_rules
    displayName: Enable Naming Rules Validation
    type: boolean
    default: true
  - name: commit_execute
    displayName: -Execute_Validate_Commits
    type: boolean
    default: true
  - name: branch_execute
    displayName: -Execute_Validate_Branch
    type: boolean
    default: true

  # Build (C / CMake)
  - name: enable_build
    displayName: Enable Fluent Bit Build
    type: boolean
    default: true

  # Artifacts
  - name: enable_artifacts
    displayName: Enable Artifacts (publicar al feed)
    type: boolean
    default: true
  - name: artifactSelection
    displayName: Artifact Selection
    type: string
    default: 'fluentbit'
    values:
      - fluentbit
      - azure_artifacts
      - aws
      - nexus
  - name: artifactDestinationName
    displayName: Artifact Destination Name (Feed/Bucket/Repository)
    type: string
    default: 'pragma-packages-azure-artifacts'
  - name: packageName
    displayName: Universal Package Name
    type: string
    default: 'fluent-bit-pragma'

# Variables que el template execute exige por contrato (no se usan en el flujo
# fluentbit, pero hatchling los hereda).
variables:
  - name: pythonVersion
    value: "3.10"
  - name: pipVersion
    value: "25.2"

trigger:
  branches:
    include:
      - main
      - develop
      - release/*
      - release
      - qa
      - feature/*
  paths:
    exclude:
      - README.md
      - .gitignore
      - 'documentation/*'
      - 'docs-*/*'
      - '**/*.md'

pr:
  branches:
    include:
      - main
      - develop
      - release/*
      - release
      - qa
  paths:
    exclude:
      - README.md
      - .gitignore
      - '**/*.md'

resources:
  repositories:
    - repository: devsecops-analisis-estatico-pipe-yml-naming-rules-validation
      name: pragma-template/devsecops-analisis-estatico-pipe-yml-naming-rules-validation
      type: git
      ref: refs/heads/trunk
    - repository: devsecops-analisis-estatico-pipe-yml-execute
      name: pragma-template/devsecops-analisis-estatico-pipe-yml-execute
      type: git
      ref: refs/heads/trunk
    - repository: devsecops-analisis-estatico-pipe-yml-artifacts
      name: pragma-template/devsecops-analisis-estatico-pipe-yml-artifacts
      type: git
      ref: refs/heads/trunk

name: $(date:yyyyMMdd)$(rev:.r)

stages:
  # 1. Naming rules
  - ${{ if eq(parameters.enable_naming_rules, true) }}:
      - template: pipe-yml-templates/pipeline.yml@devsecops-analisis-estatico-pipe-yml-naming-rules-validation
        parameters:
          soVersion: '${{ parameters.soVersion }}'
          commit_execute: '${{ parameters.commit_execute }}'
          branch_execute: '${{ parameters.branch_execute }}'

  # 2. Build (Windows + macOS si multiOS=true) usando el template execute
  - ${{ if and(eq(parameters.enable_build, true), notIn(variables['Build.Reason'], 'PullRequest')) }}:
      - template: pipe-yml-templates/pipeline.yml@devsecops-analisis-estatico-pipe-yml-execute
        parameters:
          soVersion: '${{ parameters.soVersion }}'
          pythonVersion: '${{ variables.pythonVersion }}'
          pipVersion: '${{ variables.pipVersion }}'
          stageName: '_build_fluentbit'
          test_execute: false
          multiOS: '${{ parameters.multiOS }}'
          kind: 'fluentbit'

  # 3. Publicar al feed
  - ${{ if and(eq(parameters.enable_artifacts, true), notIn(variables['Build.Reason'], 'PullRequest')) }}:
      - template: pipe-yml-templates/pipeline.yml@devsecops-analisis-estatico-pipe-yml-artifacts
        parameters:
          soVersion: '${{ parameters.soVersion }}'
          pythonVersion: '${{ variables.pythonVersion }}'
          pipVersion: '${{ variables.pipVersion }}'
          # lastStageName apunta al stage de build para que el publisher
          # localice los Pipeline Artifacts (fluentbit_windows_x64,
          # fluentbit_linux_x86_64, fluentbit_macos).
          lastStageName: 'develop_build_fluentbit'
          artifactSelection: '${{ parameters.artifactSelection }}'
          artifactDestinationName: '${{ parameters.artifactDestinationName }}'
          packageName: '${{ parameters.packageName }}'
